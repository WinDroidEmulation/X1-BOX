name: Android (X1 BOX) - Signed (NEXT-LEVEL FAST)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x1box-signed-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Cache Gradle (wrapper + caches + build-cache)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
            ~/.gradle/build-cache
          key: >-
            gradle-${{ runner.os }}-${{
              hashFiles(
                '**/*.gradle*',
                '**/gradle-wrapper.properties',
                '**/gradle.properties',
                '**/settings.gradle*',
                '**/libs.versions.toml'
              )
            }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up JDK 21 (with Gradle cache)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK / NDK / CMake
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}
            ~/.android
          key: androidsdk-${{ runner.os }}-api34-bt36.0.0-ndk29.0.14206865-cmake3.30.3
          restore-keys: |
            androidsdk-${{ runner.os }}-

      - name: Install SDK / NDK / CMake (skip if already present)
        shell: bash
        run: |
          set -e
          BT="$ANDROID_SDK_ROOT/build-tools/36.0.0"
          PL="$ANDROID_SDK_ROOT/platforms/android-34"
          NDK="$ANDROID_SDK_ROOT/ndk/29.0.14206865"
          CM="$ANDROID_SDK_ROOT/cmake/3.30.3"

          if [ -d "$BT" ] && [ -d "$PL" ] && [ -d "$NDK" ] && [ -d "$CM" ]; then
            echo "✅ Android SDK components already present. Skipping sdkmanager."
          else
            yes | sdkmanager --licenses
            sdkmanager \
              "platform-tools" \
              "platforms;android-34" \
              "build-tools;36.0.0" \
              "cmake;3.30.3" \
              "ndk;29.0.14206865"
          fi

          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Install Linux build tools (lean)
        shell: bash
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            pkg-config \
            curl \
            unzip \
            ccache \
            python3 \
            python3-setuptools
          sudo apt-get clean

      - name: Enable ccache (CMake + Gradle args)
        shell: bash
        run: |
          set -e
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV
          ccache -M 2G
          ccache -z

          echo "ORG_GRADLE_PROJECT_android.defaults.buildfeatures.buildconfig=true" >> $GITHUB_ENV

          echo "ORG_GRADLE_PROJECT_android.externalNativeBuild.cmake.arguments=-DCMAKE_C_COMPILER_LAUNCHER=ccache,-DCMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "ORG_GRADLE_PROJECT_cmake.args=-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Cache Rust (cargo + rustup)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: rust-${{ runner.os }}-stable
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Install Rust (rustup + cargo) (cached)
        shell: bash
        run: |
          set -e
          echo "CARGO_HOME=$HOME/.cargo" >> $GITHUB_ENV
          echo "RUSTUP_HOME=$HOME/.rustup" >> $GITHUB_ENV
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          if ! command -v rustc >/dev/null 2>&1; then
            curl -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          rustc --version
          cargo --version

      - name: Add Rust Android target (arm64)
        shell: bash
        run: |
          set -e
          rustup target add aarch64-linux-android
          rustup target list --installed

      - name: Export Android toolchain for cargo
        shell: bash
        run: |
          set -e
          echo "CC_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV

      - name: Detect App Name + Version (auto)
        id: meta
        shell: bash
        run: |
          set -e
          GRADLE="android/app/build.gradle.kts"
          STRINGS="android/app/src/main/res/values/strings.xml"

          if [ ! -f "$GRADLE" ]; then
            echo "❌ $GRADLE not found"
            exit 1
          fi

          VERSION_NAME=$(grep -m1 -E 'versionName\s*=' "$GRADLE" | sed -E 's/.*"([^"]+)".*/\1/' || true)
          if [ -z "$VERSION_NAME" ]; then
            echo "❌ versionName not detected in $GRADLE"
            exit 1
          fi

          if [ ! -f "$STRINGS" ]; then
            echo "❌ $STRINGS not found"
            exit 1
          fi

          APP_NAME=$(grep -m1 -E '<string\s+name="app_name"\s*>' "$STRINGS" | sed -E 's/.*<string[^>]*name="app_name"[^>]*>([^<]+)<\/string>.*/\1/' || true)
          if [ -z "$APP_NAME" ]; then
            echo "❌ app_name not detected in $STRINGS"
            exit 1
          fi

          APP_NAME_SAFE=$(echo "$APP_NAME" | tr ' ' '-' | tr -cd 'A-Za-z0-9._-')
          if [ -z "$APP_NAME_SAFE" ]; then
            echo "❌ APP_NAME_SAFE empty after sanitize"
            exit 1
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "APP_NAME_SAFE=$APP_NAME_SAFE" >> $GITHUB_ENV

      - name: Speed up Gradle (parallel + cache + daemon + try config-cache)
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.gradle"
          cat >> "$HOME/.gradle/gradle.properties" <<'EOF'
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx3g -Dkotlin.daemon.jvm.options=-Xmx2g
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn
EOF
          for f in android/gradle.properties gradle.properties; do
            if [ -f "$f" ]; then
              sed -i '/^\s*org\.gradle\.java\.home\s*=/d' "$f"
            fi
          done

      - name: Fix DEFAULT_JVM_OPTS in gradlew (Linux + Windows)
        shell: bash
        run: |
          set -e
          if [ -f android/gradlew ]; then
            sed -i 's/^DEFAULT_JVM_OPTS=.*/DEFAULT_JVM_OPTS="-Xmx2g -Xms256m"/' android/gradlew || true
            sed -i 's/"\\"-Xmx64m\\""/"-Xmx2g -Xms256m"/g' android/gradlew || true
            sed -i 's/"-Xmx64m"/"-Xmx2g -Xms256m"/g' android/gradlew || true
          fi
          if [ -f android/gradlew.bat ]; then
            sed -i 's/^set DEFAULT_JVM_OPTS=.*/set DEFAULT_JVM_OPTS=-Xmx2g -Xms256m/' android/gradlew.bat || true
          fi

      - name: Patch NDK prebuilt host tag (windows -> linux)
        shell: bash
        run: |
          set -e
          if [ -d android ]; then
            grep -RIl "windows-x86_64" android >/dev/null 2>&1 && \
              grep -RIl "windows-x86_64" android | xargs -r sed -i 's/windows-x86_64/linux-x86_64/g' || true
          fi

      - name: Delete .cxx (clean native cache)
        run: rm -rf android/app/.cxx

      - name: Decode keystore
        shell: bash
        run: |
          set -e
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/release.jks
          ls -la android/release.jks

      - name: Build Release (APK + AAB) (no clean)
        working-directory: android
        shell: bash
        run: |
          set -e
          chmod +x gradlew
          ./gradlew --version
          ./gradlew :app:assembleRelease :app:bundleRelease

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Set unique Release Tag (auto from app + version)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BASE="${APP_NAME_SAFE}-${VERSION_NAME}"
          TAG="$BASE"

          exists() {
            curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/$1" \
              | grep -q '"ref"'
          }

          if exists "$TAG"; then
            TAG="${BASE}-build${GITHUB_RUN_NUMBER}"
            if exists "$TAG"; then
              TAG="${BASE}-run${GITHUB_RUN_ID}"
            fi
          fi

          echo "REL_TAG=$TAG" >> $GITHUB_ENV
          echo "REL_NAME=$TAG" >> $GITHUB_ENV

      - name: Sign + Rename APK (delete unsigned)
        shell: bash
        run: |
          set -e
          APK_DIR="android/app/build/outputs/apk/release"
          APK_UNSIGNED="$APK_DIR/app-release-unsigned.apk"
          FINAL_APK="$APK_DIR/${APP_NAME_SAFE}-${VERSION_NAME}.apk"

          if [ ! -f "$APK_UNSIGNED" ]; then
            echo "❌ Unsigned APK not found!"
            find android/app/build/outputs/apk -type f -name "*.apk" || true
            exit 1
          fi

          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" sign \
            --ks android/release.jks \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$FINAL_APK" \
            "$APK_UNSIGNED"

          "$ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner" verify --verbose "$FINAL_APK"
          rm -f "$APK_UNSIGNED"
          echo "SIGNED_APK=$FINAL_APK" >> $GITHUB_ENV

      - name: Create GitHub Release + Upload (APK + AAB)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.REL_TAG }}"
          name: "${{ env.REL_NAME }}"
          draft: false
          prerelease: false
          files: |
            ${{ env.SIGNED_APK }}
            android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
