name: X1 BOX - Signed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install SDK + NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.1.0" "cmake;3.30.3" "ndk;29.0.14206865"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build meson pkg-config python3 curl unzip

      - name: Install PNG optimization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pngcrush optipng

      - name: Compress PNG assets (SAFE)
        run: |
          echo "Compressing PNGs..."
          find android/app/src/main/res -name "*.png" -exec pngcrush -ow -brute {} \;
          find android/app/src/main/res -name "*.png" -exec optipng -o7 {} \;

      - name: Install Rust
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add aarch64-linux-android

      - name: Set Rust optimization
        run: echo "RUSTFLAGS=-C opt-level=3" >> $GITHUB_ENV

      - name: Setup Gradle memory
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx6g" > ~/.gradle/gradle.properties

      - name: Clean build
        run: rm -rf android/app/.cxx android/app/build

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/app/release.jks

      - name: Create key.properties
        run: |
          echo "storeFile=release.jks" > android/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties

      - name: Apply safe optimizations
        run: |
          python3 - <<'PY'
          from pathlib import Path

          gradle = Path("android/app/build.gradle.kts")
          s = gradle.read_text()

          s = s.replace("-O2", "-O3 -DNDEBUG")

          s = s.replace(
              '-DCMAKE_SHARED_LINKER_FLAGS=-Wl,--gc-sections"',
              '-DCMAKE_SHARED_LINKER_FLAGS=-Wl,--gc-sections,--strip-all"'
          )

          if "debugSymbolLevel" not in s:
              s = s.replace(
                  "release {",
                  "release {\n        ndk {\n            debugSymbolLevel = \"NONE\"\n        }"
              )

          gradle.write_text(s)
          print("O3 + DNDEBUG + STRIP DONE")
          PY

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease

      - name: Detect App Name + Version (auto)
        run: |
          set -e

          GRADLE="android/app/build.gradle.kts"
          STRINGS="android/app/src/main/res/values/strings.xml"

          VERSION_NAME=$(grep -m1 -E 'versionName\s*=' "$GRADLE" | sed -E 's/.*"([^"]+)".*/\1/')
          APP_NAME=$(grep -m1 -E '<string\s+name="app_name"\s*>' "$STRINGS" | sed -E 's/.*>([^<]+)<\/string>.*/\1/')

          APP_NAME_SAFE=$(echo "$APP_NAME" | tr ' ' '-' | tr -cd 'A-Za-z0-9._-')

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "APP_NAME_SAFE=$APP_NAME_SAFE" >> $GITHUB_ENV

          echo "App: $APP_NAME"
          echo "Version: $VERSION_NAME"

      - name: Get signed APK from Gradle (rename)
        run: |
          set -e
          APK_DIR="android/app/build/outputs/apk/release"

          echo "Searching APK..."
          find android/app/build/outputs -name "*.apk"

          SRC_APK=$(find "$APK_DIR" -type f -name "*release*.apk" ! -name "*unsigned*" | head -n 1)

          if [ -z "$SRC_APK" ]; then
            echo "No signed APK found!"
            find android/app/build/outputs/apk -type f -name "*.apk" || true
            exit 1
          fi

          FINAL_APK="$APK_DIR/${APP_NAME_SAFE}-${VERSION_NAME}.apk"

          echo "Found APK: $SRC_APK"
          mv "$SRC_APK" "$FINAL_APK"

          echo "SIGNED_APK=$FINAL_APK" >> $GITHUB_ENV

      - name: Verify APK
        run: $ANDROID_SDK_ROOT/build-tools/36.1.0/apksigner verify "${{ env.SIGNED_APK }}"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release
          files: ${{ env.SIGNED_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
