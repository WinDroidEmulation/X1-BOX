name: X1 BOX - Signed

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x1box-signed-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK / NDK / CMake
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "cmake;3.30.3" \
            "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            meson \
            pkg-config \
            python3 \
            python3-pip \
            python3-setuptools \
            curl \
            unzip

      - name: Install Rust (rustup + cargo)
        run: |
          echo "CARGO_HOME=$HOME/.cargo" >> $GITHUB_ENV
          echo "RUSTUP_HOME=$HOME/.rustup" >> $GITHUB_ENV
          curl -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add Rust Android target
        run: rustup target add aarch64-linux-android

      - name: Export Android toolchain
        run: |
          echo "CC_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV

      - name: Detect App Name + Version
        run: |
          GRADLE="android/app/build.gradle.kts"
          STRINGS="android/app/src/main/res/values/strings.xml"

          VERSION_NAME=$(grep -m1 'versionName' "$GRADLE" | sed -E 's/.*"([^"]+)".*/\1/')
          APP_NAME=$(grep -m1 'app_name' "$STRINGS" | sed -E 's/.*>([^<]+)<.*/\1/')
          APP_NAME_SAFE=$(echo "$APP_NAME" | tr ' ' '-' | tr -cd 'A-Za-z0-9._-')

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "APP_NAME_SAFE=$APP_NAME_SAFE" >> $GITHUB_ENV

      - name: Fix Gradle JVM
        run: |
          for f in android/gradle.properties gradle.properties "$HOME/.gradle/gradle.properties"; do
            [ -f "$f" ] && sed -i '/org.gradle.java.home/d' "$f"
          done

      - name: Improve Gradle memory
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx6g -Xms512m" > ~/.gradle/gradle.properties

      - name: Patch NDK path
        run: grep -RIl "windows-x86_64" android | xargs -r sed -i 's/windows-x86_64/linux-x86_64/g'

      - name: Clean build cache
        run: |
          rm -rf android/app/.cxx
          rm -rf android/app/build

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/app/release.jks

      - name: Create key.properties
        run: |
          echo "storeFile=release.jks" > android/key.properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties

      - name: Add DNDEBUG and gc-sections (safe)
        run: |
          FILE="android/app/build.gradle.kts"

          sed -i 's/-DCMAKE_C_FLAGS_RELEASE=-O2 -g0 -fvisibility=hidden/-DCMAKE_C_FLAGS_RELEASE=-O2 -DNDEBUG -g0 -fvisibility=hidden/g' $FILE

          sed -i 's/-DCMAKE_CXX_FLAGS_RELEASE=-O2 -g0 -fvisibility=hidden/-DCMAKE_CXX_FLAGS_RELEASE=-O2 -DNDEBUG -g0 -fvisibility=hidden/g' $FILE

          if ! grep -q "gc-sections,-s" $FILE; then
            sed -i '/arguments += listOf/a\            "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,--gc-sections,-s",' $FILE
          fi

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean :app:assembleRelease

      - name: Prepare APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          FINAL="android/app/build/outputs/apk/release/${APP_NAME_SAFE}-${VERSION_NAME}.apk"
          mv "$APK" "$FINAL"
          echo "SIGNED_APK=$FINAL" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.APP_NAME_SAFE }}-${{ env.VERSION_NAME }}"
          name: "${{ env.APP_NAME_SAFE }}-${{ env.VERSION_NAME }}"
          files: ${{ env.SIGNED_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
